name = "swim-work"
main = "src/index.mjs"
compatibility_date = "2026-06-24"

# Static front-end lives in ./public (a dedicated dir so .git, source, and
# config are never served). The Worker (src/index.mjs) handles /api/* and falls
# back to these assets otherwise.
[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Cloudflare D1 database binding used by the Worker.
# Create it once with:  npx wrangler d1 create swim-work
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "swim-work"
database_id = "a903873d-5832-45b4-903a-2fc448d9eb6f"
